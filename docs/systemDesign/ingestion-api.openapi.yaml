openapi: 3.0.3

info:
  title: RavenLedger — Ingestion Service API
  description: |
    Porta de entrada do RavenLedger. Sistemas clientes enviam eventos de auditoria
    via REST.

    O corpo da requisição é dividido em duas seções:
    - `metadata`: identifica e roteia o evento (idempotência, origem, timestamp de transmissão).
    - `event`: conteúdo auditado (aplicação, usuário, operação e snapshot do dado).
  version: 1.0.0
  contact:
    name: BlogDoFT / RavenLedger
  license:
    name: MIT

servers:
  - url: http://localhost:5200
    description: Local development
  - url: https://ingestion.ravenledger.internal
    description: Cluster interno (K3D / ArgoCD)

tags:
  - name: Events
    description: Recepção de AuditEvents

security:
  - BearerAuth: []

paths:
  /api/v1/events:
    post:
      tags:
        - Events
      operationId: receiveAuditEvent
      summary: Recebe e enfileira um AuditEvent
      description: |
        Ingere os eventos enviados por aplicações autorizadas. 
        
        A disponibilidade para consulta dos dados não é imediata, podendo levar alguns minutos para estar
        disponível.

        O endpoint é idempotente na entrada: um `metadata.eventId` já recebido retorna
        `202` sem erro.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditEventRequest'
            example:
              metadata:
                eventId: "crm-sales-order-7891"
                source: "https://crm.example.com/"
                occurredAt: "2024-06-04T14:22:00Z"
              event:
                appInfo:
                  appname: crm-service
                  domain: sales
                  version: "3.2.1"
                user:
                  id: "usr-42"
                  name: John Doe
                  role: admin
                operation:
                  type: insert
                  entity: orders
                  generatedAt: "2024-06-04T14:21:58Z"
                  transmittedAt: "2024-06-04T14:22:00Z"
                index:
                  orderId: "Order Number"
                  customerId: "Customer Id"
                data:
                  id: "ORD-7891"
                  amount: 1500.00
                  status: confirmed
      responses:
        "202":
          description: Evento aceito e enfileirado para processamento assíncrono.
          headers:
            X-Event-Id:
              description: Espelho de `metadata.eventId` para rastreamento imediato pelo cliente.
              required: true
              schema:
                type: string
              example: "crm-sales-order-7891"
        "400":
          description: |
            Payload inválido. Pelo menos um campo obrigatório está ausente ou com
            valor fora do domínio aceito. O corpo da resposta lista todos os campos com erro.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_source:
                  summary: Campo obrigatório de metadata ausente
                  value:
                    type: "https://ravenledger.internal/errors/validation"
                    title: "Validation failed"
                    status: 400
                    errors:
                      - field: "metadata.source"
                        message: "Field 'metadata.source' is required and must not be empty."
                invalid_operation_type:
                  summary: Tipo de operação fora do domínio
                  value:
                    type: "https://ravenledger.internal/errors/validation"
                    title: "Validation failed"
                    status: 400
                    errors:
                      - field: "event.operation.type"
                        message: "Field 'event.operation.type' must be one of: insert, update, delete."
        "401":
          description: |
            Token de autenticação ausente, inválido ou expirado.
            Nenhuma validação de payload é realizada antes da autenticação.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token de serviço emitido pelo KeyCloak. O sistema cliente deve obter o token
        via Client Credentials Grant antes de enviar eventos.

  schemas:

    AuditEventRequest:
      type: object
      description: |
        Corpo da requisição de ingestão. Separa metadados de transporte (`metadata`)
        do conteúdo auditado (`event`).
      required:
        - metadata
        - event
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        event:
          $ref: '#/components/schemas/AuditEventContent'

    EventMetadata:
      type: object
      description: |
        Informações de transporte do evento: identificação única, origem e timestamp
        de transmissão. Usados para roteamento, idempotência e rastreamento.
      required:
        - eventId
        - source
        - occurredAt
      properties:
        eventId:
          type: string
          description: |
            Identificador único do evento no contexto do sistema de origem.
            Padrão recomendado: `{app}-{domain}-{entity-key}`.
            Usado para idempotência — reenvios com o mesmo `eventId` retornam `202`.
          minLength: 1
          example: "crm-sales-order-7891"
        source:
          type: string
          description: URI que identifica o sistema de origem do evento.
          minLength: 1
          example: "https://crm.example.com/"
        occurredAt:
          type: string
          format: date-time
          description: Timestamp ISO 8601 do momento em que o evento foi transmitido ao RavenLedger.
          example: "2024-06-04T14:22:00Z"

    AuditEventContent:
      type: object
      description: Conteúdo auditado — o que aconteceu, quem fez e sobre qual dado.
      required:
        - appInfo
        - user
        - operation
      properties:
        appInfo:
          $ref: '#/components/schemas/AppInfo'
        user:
          $ref: '#/components/schemas/AuditUser'
        operation:
          $ref: '#/components/schemas/Operation'
        index:
          $ref: '#/components/schemas/Index'
        data:
          $ref: '#/components/schemas/EntitySnapshot'

    AppInfo:
      type: object
      description: Identificação da aplicação que gerou o evento.
      required:
        - appname
        - domain
      properties:
        appname:
          type: string
          description: Nome da aplicação de origem.
          minLength: 1
          example: crm-service
        domain:
          type: string
          description: Domínio de negócio da aplicação (ex. sales, financeiro).
          minLength: 1
          example: sales
        version:
          type: string
          description: Versão da aplicação de origem.
          example: "3.2.1"

    AuditUser:
      type: object
      description: Autor da operação registrada.
      required:
        - id
      properties:
        id:
          type: string
          description: Identificador do usuário no sistema de origem.
          minLength: 1
          example: "usr-42"
        name:
          type: string
          description: Nome legível do usuário.
          example: John Doe
        role:
          type: string
          description: Papel ou perfil do usuário no momento da operação.
          example: admin

    Operation:
      type: object
      description: Descrição da operação sobre dados que originou o evento.
      required:
        - type
        - entity
        - generatedAt
      properties:
        type:
          type: string
          description: Tipo de operação realizada sobre a entidade.
          enum:
            - insert
            - update
            - delete
          example: insert
        entity:
          type: string
          description: Nome da entidade ou tabela afetada pela operação.
          minLength: 1
          example: orders
        generatedAt:
          type: string
          format: date-time
          description: Timestamp ISO 8601 de quando a operação foi gerada no sistema de origem.
          example: "2024-06-04T14:21:58Z"
        transmittedAt:
          type: string
          format: date-time
          description: |
            Timestamp ISO 8601 de quando o evento foi enviado ao RavenLedger.
            A diferença entre `generatedAt` e `transmittedAt` permite detectar
            latência ou falhas de transmissão.
          example: "2024-06-04T14:22:00Z"

    Index:
      type: object
      description: |
        Mapa livre de campos chave-valor definido pelo sistema cliente para facilitar
        buscas no RavenLedger sem full scan no snapshot de dados.
      additionalProperties:
        type: string
      example:
        orderId: "Order Number"
        customerId: "Customer Id"

    EntitySnapshot:
      type: object
      description: |
        Snapshot do estado da entidade no momento da operação. Estrutura livre,
        definida pelo sistema cliente. Sua imutabilidade é garantida pelo RavenLedger
        após recepção.
      additionalProperties: true
      example:
        id: "ORD-7891"
        amount: 1500.00
        status: confirmed

    ValidationErrorResponse:
      type: object
      description: Resposta de erro de validação (RFC 7807 — Problem Details).
      required:
        - type
        - title
        - status
        - errors
      properties:
        type:
          type: string
          description: URI que identifica o tipo de erro.
          example: "https://ravenledger.internal/errors/validation"
        title:
          type: string
          example: "Validation failed"
        status:
          type: integer
          example: 400
        errors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      description: Detalhe de um campo inválido ou ausente.
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: |
            Caminho dot-notation do campo com erro (ex. `metadata.source`, `event.operation.type`).
          example: "event.operation.type"
        message:
          type: string
          description: Descrição legível do motivo da rejeição.
          example: "Field 'event.operation.type' must be one of: insert, update, delete."

    ProblemDetails:
      type: object
      description: Resposta de erro genérica (RFC 7807 — Problem Details).
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          example: "https://ravenledger.internal/errors/unauthorized"
        title:
          type: string
          example: "Unauthorized"
        status:
          type: integer
          example: 401
        detail:
          type: string
          description: Explicação legível do erro para uso em diagnóstico.
          example: "Bearer token is missing or invalid."
