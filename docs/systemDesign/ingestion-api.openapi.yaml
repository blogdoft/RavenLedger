openapi: 3.0.3

info:
  title: RavenLedger — Ingestion Service API
  description: |
    RavenLedger's entry point. Client systems send audit events
    via REST.

    The request body is split into two sections:
    - `metadata`: identifies and routes the event (idempotency, origin, transmission timestamp).
    - `event`: audited content (application, user, operation, and data snapshot).
  version: 1.0.0
  contact:
    name: BlogDoFT / RavenLedger
  license:
    name: MIT

servers:
  - url: http://localhost:5200
    description: Local development
  - url: https://ingestion.ravenledger.internal
    description: Internal cluster (K3D / ArgoCD)

tags:
  - name: Events
    description: AuditEvent reception

security:
  - BearerAuth: []

paths:
  /api/v1/events:
    post:
      tags:
        - Events
      operationId: receiveAuditEvent
      summary: Receives and queues an AuditEvent
      description: |
        Ingests events sent by authorized applications.

        Availability for querying the data is not immediate and may take a few minutes to become
        available.

        The endpoint is idempotent on input: an already-received `metadata.eventId` returns
        `202` without error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditEventRequest'
            example:
              metadata:
                eventId: "crm-sales-order-7891"
                source: "https://crm.example.com/"
                occurredAt: "2024-06-04T14:22:00Z"
              event:
                appInfo:
                  appname: crm-service
                  domain: sales
                  version: "3.2.1"
                user:
                  id: "usr-42"
                  name: John Doe
                  role: admin
                operation:
                  type: insert
                  entity: orders
                  generatedAt: "2024-06-04T14:21:58Z"
                  transmittedAt: "2024-06-04T14:22:00Z"
                index:
                  orderId: "Order Number"
                  customerId: "Customer Id"
                data:
                  id: "ORD-7891"
                  amount: 1500.00
                  status: confirmed
      responses:
        "202":
          description: Event accepted and queued for asynchronous processing.
          headers:
            X-Event-Id:
              description: Mirrors `metadata.eventId` for immediate tracking by the client.
              required: true
              schema:
                type: string
              example: "crm-sales-order-7891"
        "400":
          description: |
            Invalid payload. At least one required field is missing or has a
            value outside the accepted domain. The response body lists all fields with errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_source:
                  summary: Required metadata field missing
                  value:
                    type: "https://ravenledger.internal/errors/validation"
                    title: "Validation failed"
                    status: 400
                    errors:
                      - field: "metadata.source"
                        message: "Field 'metadata.source' is required and must not be empty."
                invalid_operation_type:
                  summary: Operation type outside the domain
                  value:
                    type: "https://ravenledger.internal/errors/validation"
                    title: "Validation failed"
                    status: 400
                    errors:
                      - field: "event.operation.type"
                        message: "Field 'event.operation.type' must be one of: insert, update, delete."
        "401":
          description: |
            Authentication token missing, invalid, or expired.
            No payload validation is performed before authentication.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Service token issued by KeyCloak. The client system must obtain the token
        via Client Credentials Grant before sending events.

  schemas:

    AuditEventRequest:
      type: object
      description: |
        Ingestion request body. Separates transport metadata (`metadata`)
        from the audited content (`event`).
      required:
        - metadata
        - event
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        event:
          $ref: '#/components/schemas/AuditEventContent'

    EventMetadata:
      type: object
      description: |
        Transport information for the event: unique identification, origin, and transmission
        timestamp. Used for routing, idempotency, and tracking.
      required:
        - eventId
        - source
        - occurredAt
      properties:
        eventId:
          type: string
          description: |
            Unique identifier of the event within the source system's context.
            Recommended pattern: `{app}-{domain}-{entity-key}`.
            Used for idempotency — resends with the same `eventId` return `202`.
          minLength: 1
          example: "crm-sales-order-7891"
        source:
          type: string
          description: URI identifying the event's source system.
          minLength: 1
          example: "https://crm.example.com/"
        occurredAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the event was transmitted to RavenLedger.
          example: "2024-06-04T14:22:00Z"

    AuditEventContent:
      type: object
      description: Audited content — what happened, who did it, and on which data.
      required:
        - appInfo
        - user
        - operation
      properties:
        appInfo:
          $ref: '#/components/schemas/AppInfo'
        user:
          $ref: '#/components/schemas/AuditUser'
        operation:
          $ref: '#/components/schemas/Operation'
        index:
          $ref: '#/components/schemas/Index'
        data:
          $ref: '#/components/schemas/EntitySnapshot'

    AppInfo:
      type: object
      description: Identification of the application that generated the event.
      required:
        - appname
        - domain
      properties:
        appname:
          type: string
          description: Name of the source application.
          minLength: 1
          example: crm-service
        domain:
          type: string
          description: Business domain of the application (e.g. sales, finance).
          minLength: 1
          example: sales
        version:
          type: string
          description: Version of the source application.
          example: "3.2.1"

    AuditUser:
      type: object
      description: Author of the recorded operation.
      required:
        - id
      properties:
        id:
          type: string
          description: Identifier of the user in the source system.
          minLength: 1
          example: "usr-42"
        name:
          type: string
          description: Human-readable name of the user.
          example: John Doe
        role:
          type: string
          description: Role or profile of the user at the time of the operation.
          example: admin

    Operation:
      type: object
      description: Description of the data operation that originated the event.
      required:
        - type
        - entity
        - generatedAt
      properties:
        type:
          type: string
          description: Type of operation performed on the entity.
          enum:
            - insert
            - update
            - delete
          example: insert
        entity:
          type: string
          description: Name of the entity or table affected by the operation.
          minLength: 1
          example: orders
        generatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the operation was generated in the source system.
          example: "2024-06-04T14:21:58Z"
        transmittedAt:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp of when the event was sent to RavenLedger.
            The difference between `generatedAt` and `transmittedAt` allows detecting
            latency or transmission failures.
          example: "2024-06-04T14:22:00Z"

    Index:
      type: object
      description: |
        Free-form map of key-value fields defined by the client system to facilitate
        searches in RavenLedger without a full scan of the data snapshot.
      additionalProperties:
        type: string
      example:
        orderId: "Order Number"
        customerId: "Customer Id"

    EntitySnapshot:
      type: object
      description: |
        Snapshot of the entity's state at the time of the operation. Free-form structure,
        defined by the client system. Its immutability is guaranteed by RavenLedger
        after reception.
      additionalProperties: true
      example:
        id: "ORD-7891"
        amount: 1500.00
        status: confirmed

    ValidationErrorResponse:
      type: object
      description: Validation error response (RFC 7807 — Problem Details).
      required:
        - type
        - title
        - status
        - errors
      properties:
        type:
          type: string
          description: URI identifying the error type.
          example: "https://ravenledger.internal/errors/validation"
        title:
          type: string
          example: "Validation failed"
        status:
          type: integer
          example: 400
        errors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      description: Detail of an invalid or missing field.
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: |
            Dot-notation path of the field with the error (e.g. `metadata.source`, `event.operation.type`).
          example: "event.operation.type"
        message:
          type: string
          description: Human-readable description of the rejection reason.
          example: "Field 'event.operation.type' must be one of: insert, update, delete."

    ProblemDetails:
      type: object
      description: Generic error response (RFC 7807 — Problem Details).
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          example: "https://ravenledger.internal/errors/unauthorized"
        title:
          type: string
          example: "Unauthorized"
        status:
          type: integer
          example: 401
        detail:
          type: string
          description: Human-readable explanation of the error for diagnostic purposes.
          example: "Bearer token is missing or invalid."
